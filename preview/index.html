<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MukundTube Preview</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MukundTube</h1>
      <p id="status">Ready.</p>
    </div>
    <button id="refreshButton" type="button">Refresh</button>
  </header>

  <main class="app-shell">
    <section id="playerSection" class="player-section hidden" aria-label="Player">
      <div class="player-frame">
        <div id="player" class="player"></div>
      </div>
      <div class="video-details">
        <h2 id="selectedTitle">Choose an approved video</h2>
        <p id="selectedMeta"></p>
      </div>
    </section>

    <section id="channelSection" class="browse-section" aria-label="Approved channels">
      <div class="section-heading">
        <h2>Channels</h2>
      </div>
      <div id="channelSkeleton" class="channel-grid skeleton-grid hidden" aria-hidden="true"></div>
      <div id="channelGrid" class="channel-grid"></div>
    </section>

    <section id="videoSection" class="browse-section hidden" aria-label="Channel videos">
      <div class="section-heading">
        <button id="backButton" class="plain-button" type="button">Channels</button>
        <h2 id="channelTitle">Videos</h2>
      </div>
      <div id="videoSkeleton" class="video-grid skeleton-grid hidden" aria-hidden="true"></div>
      <div id="videoVirtualList" class="video-virtual-list">
        <div id="videoVirtualSpacer" class="video-virtual-spacer"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js?v=12"></script>
</body>
</html>
