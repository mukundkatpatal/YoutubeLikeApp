<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://s.ytimg.com https://i.ytimg.com https://*.googlevideo.com https://*.gstatic.com https://*.doubleclick.net; script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://i.ytimg.com data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Youtube Beta Player</title>
  <style>
    html,
    body,
    #player {
      background: #050505;
      height: 100%;
      margin: 0;
      overflow: hidden;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const requestedVideoId = params.get("videoId") || "";
    let player;
    let lastVideoId = "";

    function post(message) {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(message);
      }
    }

    function reportCurrentVideo() {
      if (!player || typeof player.getVideoData !== "function") {
        return;
      }

      const data = player.getVideoData();
      const currentVideoId = data && data.video_id ? data.video_id : "";
      if (currentVideoId && currentVideoId !== lastVideoId) {
        lastVideoId = currentVideoId;
        post({ type: "video", videoId: currentVideoId });
      }
    }

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: requestedVideoId,
        host: "https://www.youtube-nocookie.com",
        playerVars: {
          autoplay: 1,
          controls: 1,
          disablekb: 1,
          enablejsapi: 1,
          fs: 1,
          iv_load_policy: 3,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          origin: window.location.origin
        },
        events: {
          onReady: function () {
            reportCurrentVideo();
            if (typeof player.mute === "function") {
              player.mute();
            }

            if (typeof player.playVideo === "function") {
              player.playVideo();
            }

            window.setInterval(reportCurrentVideo, 1000);
          },
          onStateChange: reportCurrentVideo,
          onError: function (event) {
            post({ type: "error", code: String(event.data || "") });
          }
        }
      });
    };

    window.stopPlayer = function () {
      if (player && typeof player.stopVideo === "function") {
        player.stopVideo();
      }
    };
  </script>
</body>
</html>
